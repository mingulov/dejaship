scenarios:
  smoke:
    agent_count: 4
    total_calls_target: 60
    model_set: smoke
    require_stored_fixtures: true
    run_stale_cleanup: false
    persona_mix:
      cautious: 1
      aggressive: 1
      reviser: 1
      shipper: 1
    brief_selection_strategy: balanced
    requires_live_llm: false
    description: Quick deterministic replay for local development.
  local:
    agent_count: 10
    total_calls_target: 300
    model_set: smoke
    require_stored_fixtures: true
    run_stale_cleanup: false
    persona_mix:
      cautious: 1
      aggressive: 1
      overlap-averse: 1
      overlap-tolerant: 1
      reviser: 1
      shipper: 1
      abandoner: 1
      monitor-first: 1
      noisy-prompter: 1
      duplicate-prone: 1
