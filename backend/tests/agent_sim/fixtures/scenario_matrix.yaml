  extended:
    agent_count: 12
    total_calls_target: 500
    model_set: smoke
    require_stored_fixtures: true
    run_stale_cleanup: false
    persona_mix:
      cautious: 2
      aggressive: 1
      overlap-averse: 1
      overlap-tolerant: 1
